spring.application.name=service-merchandising
server.port=8091

# Conexión a bd
spring.datasource.url=jdbc:mysql://localhost:3306/db_merchandising?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Swagger
springdoc.api-docs.path=/merchandising/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
spring.mvc.cors.allowed-origins=http://localhost:8181
spring.mvc.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.mvc.cors.allowed-headers=*
springdoc.swagger-ui.operations-sorter=alpha
springdoc.server-url=http://localhost:8181