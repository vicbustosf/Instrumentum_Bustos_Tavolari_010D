server:
  port: 8181

jwt:
  secret: "493358340235739058340598340598340598340598340598"

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "http://localhost:9090"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
      routes:
        #---- Microservicio auth ----
        - id: service-auth
          uri: http://localhost:8089
          predicates:
            - Path=/auth/**

        - id: service-usuario
          uri: http://localhost:8081
          predicates:
            - Path=/api/v2/usuarios/**, /api/v2/bandas/**
          filters:
            - AuthFilter

        # IMPORTANTE: service-rig-equipos debe ir ANTES de service-inventario
        # para que capture la subruta /en-cancion/** y no sea interceptada globalmente.
        - id: service-rig-equipos
          uri: http://localhost:8085
          predicates:
            - Path=/api/v2/equipos/en-cancion/**
          filters:
            - AuthFilter

        - id: service-inventario
          uri: http://localhost:8082
          predicates:
            - Path=/api/v2/equipos/**, /api/v2/marcas/**, /api/v2/categorias/**
          filters:
            - AuthFilter

        - id: service-specs
          uri: http://localhost:8083
          predicates:
            - Path=/api/v2/especs/**
          filters:
            - AuthFilter

        - id: service-mantenimiento
          uri: http://localhost:8084
          predicates:
            - Path=/api/v2/mantenimientos/**
          filters:
            - AuthFilter

        - id: service-rig
          uri: http://localhost:8085
          predicates:
            - Path=/api/v2/canciones/**
          filters:
            - AuthFilter

        # --- Nuevos Microservicios ---
        - id: service-evento
          uri: http://localhost:8086
          predicates:
            - Path=/api/v2/eventos/**
          filters:
            - AuthFilter
        
        - id: service-finanza
          uri: http://localhost:8087
          predicates:
            - Path=/api/v2/finanzas/**
          filters:
            - AuthFilter 

        - id: service-gira
          uri: http://localhost:8088
          predicates:
            - Path=/api/v2/giras/**, /api/v2/paradas/**
          filters:
            - AuthFilter
  
        - id: service-logistica
          uri: http://localhost:8090
          predicates:
            - Path=/api/v2/logistica/**
          filters:
            - AuthFilter

        - id: service-merchandising
          uri: http://localhost:8091
          predicates:
            - Path=/api/v2/merchandising/**
          filters:
            - AuthFilter

        # --- Rutas Docs ---
        - id: logistica-docs
          uri: http://localhost:8090 # Ver si se puede tener en el mismo puerto con los normales...
          predicates:
            - Path=/logistica/api-docs

        - id: merchandising-docs
          uri: http://localhost:8091
          predicates:
            - Path=/merchandising/api-docs
#Volver a checar si los microservicios se interceptan entre ellos...

eureka:
  client:
    register-with-eureka: false
    fetch-registry: false

springdoc:
  swagger-ui:
    urls:
      - name: Servicio Logistica
        url: /logistica/api-docs

      - name: Servicio Merchandising
        url: /merchandising/api-docs

logging:
  level:
    org.springframework.cloud.gateway: TRACE
    org.springframework.http.server.reactive: DEBUG